<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hexagonal Tiles</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg: #0b0b1a;
            --fg: #e6e6f0;
            --muted: #6e6e90;
            --accent: #e07a5f;
            --accent-dim: rgba(224, 122, 95, 0.15);
            --card: #13132a;
            --card2: #1a1a38;
            --border: #28284a;
            --sidebar-w: 310px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg);
            color: var(--fg);
            overflow: hidden;
            height: 100vh;
            display: flex
        }

        #canvas-wrap {
            flex: 1;
            position: relative;
            overflow: hidden
        }

        #hexCanvas {
            display: block;
            cursor: grab
        }

        #hexCanvas:active {
            cursor: grabbing
        }

        .zoom-bar {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 6px 14px;
            backdrop-filter: blur(8px);
            z-index: 10
        }

        .zoom-bar button {
            width: 36px;
            height: 36px;
            border: none;
            border-radius: 10px;
            background: var(--card2);
            color: var(--fg);
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all .2s
        }

        .zoom-bar button:hover {
            background: var(--accent);
            color: #fff;
            transform: scale(1.08)
        }

        .zoom-bar .zlabel {
            font-size: 13px;
            font-weight: 600;
            min-width: 52px;
            text-align: center;
            user-select: none
        }

        .sidebar {
            width: var(--sidebar-w);
            background: var(--card);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            overflow-x: hidden
        }

        .sidebar::-webkit-scrollbar {
            width: 5px
        }

        .sidebar::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px
        }

        .sb-header {
            padding: 22px 20px 14px;
            border-bottom: 1px solid var(--border)
        }

        .sb-header h2 {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -.5px
        }

        .sb-header p {
            font-size: 12px;
            color: var(--muted);
            margin-top: 4px
        }

        .sb-section {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border)
        }

        .sb-section label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--muted);
            font-weight: 600;
            display: block;
            margin-bottom: 10px
        }

        .upload-zone {
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 22px 12px;
            text-align: center;
            cursor: pointer;
            transition: all .25s
        }

        .upload-zone:hover {
            border-color: var(--accent);
            background: var(--accent-dim)
        }

        .upload-zone i {
            font-size: 26px;
            color: var(--muted);
            display: block;
            margin-bottom: 6px
        }

        .upload-zone p {
            font-size: 12px;
            color: var(--muted)
        }

        .upload-zone .filename {
            font-size: 11px;
            color: var(--accent);
            margin-top: 6px;
            word-break: break-all
        }

        #fileInput {
            display: none
        }

        .editor {
            display: none;
            flex-direction: column;
            gap: 10px;
            animation: fadeSlide .3s ease
        }

        .editor.open {
            display: flex
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(8px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .preview-wrap {
            display: flex;
            justify-content: center;
            padding: 14px;
            background: var(--bg);
            border-radius: 12px
        }

        #previewCanvas {
            border-radius: 8px
        }

        .slider-row {
            display: flex;
            flex-direction: column;
            gap: 3px
        }

        .slider-row .s-top {
            display: flex;
            justify-content: space-between;
            align-items: center
        }

        .slider-row .s-top span {
            font-size: 12px;
            color: var(--muted)
        }

        .slider-row .s-top .s-val {
            font-size: 12px;
            color: var(--accent);
            font-weight: 600;
            min-width: 40px;
            text-align: right
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            height: 5px;
            background: var(--border);
            border-radius: 3px;
            outline: none
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 15px;
            height: 15px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            transition: transform .12s
        }

        input[type=range]::-webkit-slider-thumb:hover {
            transform: scale(1.25)
        }

        input[type=range]::-moz-range-thumb {
            width: 15px;
            height: 15px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            border: none
        }

        .btn {
            padding: 9px 14px;
            border: none;
            border-radius: 9px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all .2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px
        }

        .btn-accent {
            background: var(--accent);
            color: #fff
        }

        .btn-accent:hover {
            filter: brightness(1.15);
            transform: translateY(-1px)
        }

        .btn-ghost {
            background: var(--card2);
            color: var(--fg);
            border: 1px solid var(--border)
        }

        .btn-ghost:hover {
            border-color: var(--muted)
        }

        .btn-row {
            display: flex;
            gap: 8px
        }

        .btn-row .btn {
            flex: 1
        }

        .tile-info {
            padding: 12px 14px;
            background: var(--bg);
            border-radius: 10px;
            font-size: 11px;
            color: var(--muted);
            line-height: 1.7
        }

        .tile-info strong {
            color: var(--fg);
            font-weight: 600
        }

        .hover-info {
            padding: 10px 14px;
            background: var(--accent-dim);
            border: 1px solid rgba(224, 122, 95, .2);
            border-radius: 10px;
            font-size: 12px;
            line-height: 1.6;
            display: none
        }

        .hover-info.visible {
            display: block
        }

        .hover-info .hi-coord {
            color: var(--accent);
            font-weight: 600
        }

        .toggle-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px
        }

        .toggle-row span {
            font-size: 13px;
            color: var(--fg)
        }

        .switch {
            position: relative;
            width: 44px;
            height: 24px;
            flex-shrink: 0
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0
        }

        .switch .track {
            position: absolute;
            inset: 0;
            background: var(--border);
            border-radius: 12px;
            cursor: pointer;
            transition: background .25s
        }

        .switch .track::after {
            content: '';
            position: absolute;
            left: 3px;
            top: 3px;
            width: 18px;
            height: 18px;
            background: #fff;
            border-radius: 50%;
            transition: transform .25s
        }

        .switch input:checked+.track {
            background: var(--accent)
        }

        .switch input:checked+.track::after {
            transform: translateX(20px)
        }

        .grad-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 10px
        }

        .grad-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 8px;
            background: var(--bg);
            border-radius: 8px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: border-color 0.2s
        }

        .grad-item:hover,
        .grad-item.active {
            border-color: var(--accent)
        }

        .grad-item input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 24px;
            height: 24px;
            border-radius: 4px;
            cursor: pointer;
            background: none;
            padding: 0
        }

        .grad-item input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0
        }

        .grad-item input[type="color"]::-webkit-color-swatch {
            border: 1px solid var(--border);
            border-radius: 4px
        }

        .grad-item span {
            font-size: 12px;
            color: var(--fg);
            flex: 1
        }

        .grad-remove-btn {
            width: 22px;
            height: 22px;
            border: none;
            border-radius: 6px;
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            transition: all .2s;
            flex-shrink: 0;
            padding: 0
        }

        .grad-remove-btn:hover {
            background: rgba(224, 122, 95, 0.2);
            color: var(--accent)
        }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--card2);
            border: 1px solid var(--accent);
            color: var(--fg);
            padding: 10px 22px;
            border-radius: 12px;
            font-size: 13px;
            font-family: 'Space Grotesk', sans-serif;
            z-index: 1000;
            transition: transform .35s cubic-bezier(.34, 1.56, .64, 1);
            pointer-events: none;
            white-space: nowrap
        }

        .toast.show {
            transform: translateX(-50%) translateY(0)
        }
    </style>
</head>

<body>

    <div id="canvas-wrap">
        <canvas id="hexCanvas"></canvas>
        <div class="zoom-bar">
            <button id="zoomOut" title="Zoom out"><i class="fas fa-minus"></i></button>
            <span class="zlabel" id="zoomLabel">100%</span>
            <button id="zoomIn" title="Zoom in"><i class="fas fa-plus"></i></button>
            <button id="resetView" title="Reset view"><i class="fas fa-crosshairs"></i></button>
        </div>
    </div>

    <aside class="sidebar">
        <div class="sb-header">
            <h2>Hex Tiles</h2>
            <p>Infinite tiled canvas with per-tile rotation</p>
        </div>

        <div class="sb-section">
            <label>Hovered Tile</label>
            <div class="hover-info" id="hoverInfo">
                <span class="hi-coord" id="hiCoord">—</span><br>
                Rotation: <strong id="hiRot">—</strong>
            </div>
            <div class="tile-info" id="defaultInfo">
                <strong>Click</strong> a tile to rotate by 60 deg<br>
                <strong>Scroll</strong> to zoom &middot; <strong>Drag</strong> to pan<br>
                <strong>Double-click</strong> a tile to reset to 0 deg
            </div>
        </div>

        <div class="sb-section">
            <label>Display</label>
            <div class="toggle-row">
                <span><i class="fas fa-border-all" style="margin-right:6px;color:var(--muted)"></i>Grid lines</span>
                <label class="switch">
                    <input type="checkbox" id="gridToggle" checked>
                    <span class="track"></span>
                </label>
            </div>
        </div>

        <div class="sb-section">
            <label>Color Gradient</label>
            <div id="gradientList" class="grad-list"></div>
            <button class="btn btn-ghost" id="addMarkerBtn" style="width:100%"><i class="fas fa-plus"></i> Add
                Marker</button>
        </div>

        <div class="sb-section">
            <label>Curve Colors</label>
            <div id="curveList" class="grad-list"></div>
            <button class="btn btn-ghost" id="addCurveBtn" style="width:100%"><i class="fas fa-plus"></i> Add
                Color</button>
        </div>

        <div class="sb-section">
            <label>Texture</label>
            <div class="upload-zone" id="uploadZone">
                <i class="fas fa-cloud-upload-alt"></i>
                <p>Click or drop an image</p>
                <div class="filename" id="fileName"></div>
            </div>
            <input type="file" id="fileInput" accept="image/*">
            <div style="margin-top:8px">
                <button class="btn btn-ghost" id="resetTexBtn" style="width:100%"><i class="fas fa-undo"></i> Reset to
                    White</button>
            </div>
        </div>

        <div class="sb-section editor" id="editorPanel">
            <label>Align Texture to Hex</label>
            <div class="preview-wrap">
                <canvas id="previewCanvas" width="220" height="220"></canvas>
            </div>
            <div class="slider-row">
                <div class="s-top"><span>Rotation</span><span class="s-val" id="vRot">0°</span></div>
                <input type="range" id="sRot" min="0" max="360" step="1" value="0">
            </div>
            <div class="slider-row">
                <div class="s-top"><span>Scale</span><span class="s-val" id="vScale">1.00x</span></div>
                <input type="range" id="sScale" min="0.1" max="4" step="0.05" value="1">
            </div>
            <div class="slider-row">
                <div class="s-top"><span>Stretch X</span><span class="s-val" id="vSX">1.00x</span></div>
                <input type="range" id="sSX" min="0.2" max="3" step="0.05" value="1">
            </div>
            <div class="slider-row">
                <div class="s-top"><span>Stretch Y</span><span class="s-val" id="vSY">1.00x</span></div>
                <input type="range" id="sSY" min="0.2" max="3" step="0.05" value="1">
            </div>
            <div class="slider-row">
                <div class="s-top"><span>Offset X</span><span class="s-val" id="vOX">0</span></div>
                <input type="range" id="sOX" min="-150" max="150" step="1" value="0">
            </div>
            <div class="slider-row">
                <div class="s-top"><span>Offset Y</span><span class="s-val" id="vOY">0</span></div>
                <input type="range" id="sOY" min="-150" max="150" step="1" value="0">
            </div>
            <div class="btn-row">
                <button class="btn btn-ghost" id="cancelEd">Close</button>
                <button class="btn btn-accent" id="applyEd">Apply Texture</button>
            </div>
        </div>

        <div class="sb-section" style="border-bottom:none">
            <button class="btn btn-ghost" id="randomizeBtn" style="width:100%;margin-bottom:8px"><i
                    class="fas fa-dice"></i> Randomize All Angles</button>
            <button class="btn btn-ghost" id="resetAllRot" style="width:100%"><i class="fas fa-sync-alt"></i> Reset All
                Tile Rotations</button>
        </div>
    </aside>

    <div class="toast" id="toast"></div>

    <script>
        (() => {
            // ──── Constants ────
            const HEX_R = 62;
            const SQRT3 = Math.sqrt(3);
            const MIN_Z = 0.12;
            const MAX_Z = 6;
            const CLICK_THRESH = 5;
            const CLICK_DUR = 280;
            const BULK_DUR = 420;
            const ROT_STEP = 60;
            const ROT_MOD = 360 / ROT_STEP;
            const DEG2RAD = Math.PI / 180;
            const PI_DIV_3 = Math.PI / 3;
            const TWO_PI_DIV_3 = 2 * Math.PI / 3;
            const FOUR_PI_DIV_3 = 4 * Math.PI / 3;

            // ──── Tracing Algorithm Limits ────
            const TRACE_QUEUE_MARGIN = 10;      // Extra hex tiles beyond visible bounds to process curves
            const TRACE_MAX_PER_FRAME = 1000;   // Max curve segments to process per frame to avoid lag
            const TRACE_SEARCH_MARGIN = 5;      // Extra hex tiles beyond visible bounds to search for uncolored tiles
            const VISIBLE_BOUND_MULT = 3;       // Multiplier for HEX_R to define visible screen bounds

            // ──── State ────
            let zoom = 1, panX = 0, panY = 0;
            let isDrag = false, dragSX = 0, dragSY = 0, dragPX = 0, dragPY = 0, dragMoved = false;
            let mouseScreenX = -9999, mouseScreenY = -9999;
            let hoveredQ = null, hoveredR = null;
            let showGrid = false;
            let isInitialized = false;
            let rotMode = 'hash';
            let randomSeed = 0;
            let texImg = null;
            let pendImg = null;
            let texTf = { rot: 0, scale: 1, sx: 1, sy: 1, ox: 0, oy: 0 };
            const rotOverrides = new Map();
            const animMap = new Map();

            // Gradient State
            let gradientMarkers = [];
            let activeMarkerIndex = 0;
            let isDragMarker = false;
            let dragMarkerOffsetX = 0;
            let dragMarkerOffsetY = 0;
            let gradientCanvas = null;
            let markersVisible = true;

            // Curve Color State & Cache Layers
            let curveColors = ['#000000'];
            let activeCurveIndex = 0;
            let nextCurveID = 0;
            const curveMap = new Map();      // Maps EdgeID -> CurveID
            const curves = new Map();        // Maps CurveID -> { color, size, locked, edges }
            let queue = [];                  // DFS queue for curve extension

            const markerPalette = ['#ffffff', '#3d5a80', '#81b29a', '#f2cc8f', '#98c1d9', '#ee6c4d', '#c08497', '#7b9e89'];
            const curvePalette = ['#e07a5f', '#3d5a80', '#81b29a', '#f2cc8f', '#98c1d9', '#ee6c4d', '#c08497', '#7b9e89'];

            // ──── DOM Cache ────
            const dom = {
                cvs: document.getElementById('hexCanvas'),
                wrap: document.getElementById('canvas-wrap'),
                hoverInfo: document.getElementById('hoverInfo'),
                defaultInfo: document.getElementById('defaultInfo'),
                hiCoord: document.getElementById('hiCoord'),
                hiRot: document.getElementById('hiRot'),
                zoomLabel: document.getElementById('zoomLabel'),
                zoomIn: document.getElementById('zoomIn'),
                zoomOut: document.getElementById('zoomOut'),
                resetView: document.getElementById('resetView'),
                gridToggle: document.getElementById('gridToggle'),
                uploadZone: document.getElementById('uploadZone'),
                fileInput: document.getElementById('fileInput'),
                fileName: document.getElementById('fileName'),
                editorPanel: document.getElementById('editorPanel'),
                resetTexBtn: document.getElementById('resetTexBtn'),
                cancelEd: document.getElementById('cancelEd'),
                applyEd: document.getElementById('applyEd'),
                randomizeBtn: document.getElementById('randomizeBtn'),
                resetAllRot: document.getElementById('resetAllRot'),
                toast: document.getElementById('toast'),
                previewCanvas: document.getElementById('previewCanvas'),
                sRot: document.getElementById('sRot'),
                sScale: document.getElementById('sScale'),
                sSX: document.getElementById('sSX'),
                sSY: document.getElementById('sSY'),
                sOX: document.getElementById('sOX'),
                sOY: document.getElementById('sOY'),
                vRot: document.getElementById('vRot'),
                vScale: document.getElementById('vScale'),
                vSX: document.getElementById('vSX'),
                vSY: document.getElementById('vSY'),
                vOX: document.getElementById('vOX'),
                vOY: document.getElementById('vOY'),
                gradientList: document.getElementById('gradientList'),
                addMarkerBtn: document.getElementById('addMarkerBtn'),
                curveList: document.getElementById('curveList'),
                addCurveBtn: document.getElementById('addCurveBtn')
            };

            const ctx = dom.cvs.getContext('2d');

            function hexKey(q, r) { return (q << 16) ^ r; }

            function hashQR(q, r) {
                let h = (q * 374761393 + r * 668265263 + randomSeed * 1013904223 + 2654435761) | 0;
                h = Math.imul(h ^ (h >>> 13), 1274126177);
                return Math.abs(h ^ (h >>> 16));
            }

            function baseRot(q, r) {
                if (rotMode === 'zero') return 0;
                return (hashQR(q, r) % ROT_MOD) * ROT_STEP;
            }

            function tileRot(q, r) {
                const k = hexKey(q, r);
                return rotOverrides.has(k) ? rotOverrides.get(k) : baseRot(q, r);
            }

            function nearestTarget(from, target) {
                const diff = ((target - from) % 360 + 540) % 360 - 180;
                return from + diff;
            }

            function displayRot(q, r, now) {
                const k = hexKey(q, r);
                const a = animMap.get(k);
                if (!a) return tileRot(q, r);
                const elapsed = now - a.start;
                if (elapsed >= a.duration) return tileRot(q, r);
                const t = elapsed / a.duration;
                const ease = 1 - Math.pow(1 - t, 3);
                return a.from + (a.to - a.from) * ease;
            }

            function hexToPix(q, r, z, px, py) {
                return {
                    x: HEX_R * 1.5 * q * z + px,
                    y: HEX_R * (SQRT3 * 0.5 * q + SQRT3 * r) * z + py
                };
            }

            function pixToHex(sx, sy, z, px, py) {
                const x = (sx - px) / (HEX_R * z);
                const y = (sy - py) / (HEX_R * z);
                const fq = x * 2 / 3;
                const fr = -x / 3 + SQRT3 / 3 * y;
                return hexRound(fq, fr);
            }

            function hexRound(fq, fr) {
                const fs = -fq - fr;
                let rq = Math.round(fq), rr = Math.round(fr), rs = Math.round(fs);
                const dq = Math.abs(rq - fq), dr = Math.abs(rr - fr), ds = Math.abs(rs - fs);
                if (dq > dr && dq > ds) rq = -rr - rs;
                else if (dr > ds) rr = -rq - rs;
                return { q: rq, r: rr };
            }

            function traceHexPath(c, cx, cy, sz) {
                c.beginPath();
                for (let i = 0; i < 6; i++) {
                    const a = PI_DIV_3 * i;
                    const vx = cx + sz * Math.cos(a);
                    const vy = cy + sz * Math.sin(a);
                    i === 0 ? c.moveTo(vx, vy) : c.lineTo(vx, vy);
                }
                c.closePath();
            }

            function visibleHexes(z, px, py, W, H) {
                const margin = HEX_R * z * VISIBLE_BOUND_MULT;
                const tl = pixToHex(-margin, -margin, z, px, py);
                const tr = pixToHex(W + margin, -margin, z, px, py);
                const bl = pixToHex(-margin, H + margin, z, px, py);
                const br = pixToHex(W + margin, H + margin, z, px, py);
                const minQ = Math.min(tl.q, tr.q, bl.q, br.q);
                const maxQ = Math.max(tl.q, tr.q, bl.q, br.q);
                const minR = Math.min(tl.r, tr.r, bl.r, br.r);
                const maxR = Math.max(tl.r, tr.r, bl.r, br.r);
                const out = [];
                for (let q = minQ; q <= maxQ; q++) {
                    for (let r = minR; r <= maxR; r++) {
                        const p = hexToPix(q, r, z, px, py);
                        if (p.x > -margin && p.x < W + margin && p.y > -margin && p.y < H + margin) {
                            out.push({ q, r, x: p.x, y: p.y });
                        }
                    }
                }
                return out;
            }

            // ──── IDW Gradient ────
            function drawIDWGradient(W, H) {
                if (gradientMarkers.length === 0) return;

                const scale = 0.2;
                const lowW = Math.max(2, Math.ceil(W * scale));
                const lowH = Math.max(2, Math.ceil(H * scale));

                if (!gradientCanvas) gradientCanvas = document.createElement('canvas');
                if (gradientCanvas.width !== lowW || gradientCanvas.height !== lowH) {
                    gradientCanvas.width = lowW;
                    gradientCanvas.height = lowH;
                }
                const gctx = gradientCanvas.getContext('2d');

                const imgData = gctx.createImageData(lowW, lowH);
                const data = imgData.data;

                const ms = gradientMarkers.map(m => ({
                    x: m.x * scale,
                    y: m.y * scale,
                    r: parseInt(m.color.slice(1, 3), 16),
                    g: parseInt(m.color.slice(3, 5), 16),
                    b: parseInt(m.color.slice(5, 7), 16)
                }));

                const n = ms.length;

                if (n === 1) {
                    const m = ms[0];
                    for (let i = 0; i < lowW * lowH; i++) {
                        const idx = i * 4;
                        data[idx] = m.r;
                        data[idx + 1] = m.g;
                        data[idx + 2] = m.b;
                        data[idx + 3] = 255;
                    }
                } else {
                    for (let py = 0; py < lowH; py++) {
                        for (let px = 0; px < lowW; px++) {
                            let totalWeight = 0;
                            let r = 0, g = 0, b = 0;

                            for (let i = 0; i < n; i++) {
                                const m = ms[i];
                                const dx = px - m.x;
                                const dy = py - m.y;
                                const distSq = dx * dx + dy * dy + 0.5;
                                const weight = 1 / (distSq * distSq);
                                totalWeight += weight;
                                r += m.r * weight;
                                g += m.g * weight;
                                b += m.b * weight;
                            }

                            r /= totalWeight;
                            g /= totalWeight;
                            b /= totalWeight;

                            const idx = (py * lowW + px) * 4;
                            data[idx] = r;
                            data[idx + 1] = g;
                            data[idx + 2] = b;
                            data[idx + 3] = 255;
                        }
                    }
                }

                gctx.putImageData(imgData, 0, 0);

                ctx.imageSmoothingEnabled = true;
                ctx.imageSmoothingQuality = 'high';
                ctx.drawImage(gradientCanvas, 0, 0, lowW, lowH, 0, 0, W, H);
            }

            function getContrastColor(hex) {
                const r = parseInt(hex.slice(1, 3), 16);
                const g = parseInt(hex.slice(3, 5), 16);
                const b = parseInt(hex.slice(5, 7), 16);
                const lum = 0.299 * r + 0.587 * g + 0.114 * b;
                return lum > 140 ? '#000000' : '#ffffff';
            }

            // ──── Curve Deduction Engine (Topological DFS) ────
            function getNeighbor(q, r, e) {
                if (e === 0) return { q: q + 1, r: r, edge: 3 };
                if (e === 1) return { q: q, r: r + 1, edge: 4 };
                if (e === 2) return { q: q - 1, r: r + 1, edge: 5 };
                if (e === 3) return { q: q - 1, r: r, edge: 0 };
                if (e === 4) return { q: q, r: r - 1, edge: 1 };
                if (e === 5) return { q: q + 1, r: r - 1, edge: 2 };
            }

            function edgeID(q, r, e) {
                const n = getNeighbor(q, r, e);
                const id1 = q + "," + r + "," + e;
                const id2 = n.q + "," + n.r + "," + n.edge;
                return id1 < id2 ? id1 : id2;
            }

            function getOtherEdge(k, e) {
                const eb = (e - k + 6) % 6;
                let ob;
                if (eb === 2) ob = 3;
                else if (eb === 3) ob = 2;
                else if (eb === 4) ob = 0;
                else if (eb === 0) ob = 4;
                else if (eb === 1) ob = 5;
                else if (eb === 5) ob = 1;
                return (ob + k) % 6;
            }

            function mergeCurves(c1, c2) {
                if (c1 === c2) return;
                let curve1 = curves.get(c1);
                let curve2 = curves.get(c2);
                if (!curve1 || !curve2) return;

                let target, source;
                if (curve1.size > curve2.size) {
                    target = curve1; source = curve2;
                } else if (curve2.size > curve1.size) {
                    target = curve2; source = curve1;
                } else {
                    if (Math.random() < 0.5) { target = curve1; source = curve2; }
                    else { target = curve2; source = curve1; }
                }

                for (let id of source.edges) {
                    curveMap.set(id, target.id);
                    target.edges.add(id);
                }
                target.size = target.edges.size;
                if (source.locked) target.locked = true;

                curves.delete(source.id);
            }

            function processQueue() {
                let bounds = getVisibleBounds();
                let margin = TRACE_QUEUE_MARGIN;
                let processed = 0;
                let maxPerFrame = TRACE_MAX_PER_FRAME;

                while (queue.length > 0 && processed < maxPerFrame) {
                    let item = queue.pop(); // DFS 
                    processed++;

                    if (item.q < bounds.minQ - margin || item.q > bounds.maxQ + margin ||
                        item.r < bounds.minR - margin || item.r > bounds.maxR + margin) {
                        continue;
                    }

                    let id = edgeID(item.q, item.r, item.e);
                    if (!curveMap.has(id)) continue;

                    let curveID = curveMap.get(id);
                    let curve = curves.get(curveID);
                    if (!curve || curve.locked) continue;

                    let k = (tileRot(item.q, item.r) / 60) % 6;
                    let pe = getOtherEdge(k, item.e);
                    let pid = edgeID(item.q, item.r, pe);

                    if (curveMap.has(pid)) {
                        let existingCurve = curveMap.get(pid);
                        if (existingCurve === curveID) {
                            curve.locked = true; // Loop completed
                        } else {
                            mergeCurves(curveID, existingCurve);
                        }
                    } else {
                        curveMap.set(pid, curveID);
                        curve.edges.add(pid);
                        curve.size++;

                        let n = getNeighbor(item.q, item.r, pe);
                        queue.push({ q: n.q, r: n.r, e: n.edge });
                    }
                }
            }

            function findNextUncoloredTile() {
                let bounds = getVisibleBounds();
                let margin = TRACE_SEARCH_MARGIN;
                let bestTile = null;
                let bestDist = Infinity;

                let center = pixToHex(dom.cvs.width / 2, dom.cvs.height / 2, zoom, panX, panY);

                for (let q = bounds.minQ - margin; q <= bounds.maxQ + margin; q++) {
                    for (let r = bounds.minR - margin; r <= bounds.maxR + margin; r++) {
                        let dq = q - center.q;
                        let dr = r - center.r;
                        let dist = Math.max(Math.abs(dq), Math.abs(dr), Math.abs(-dq - dr));
                        if (dist < bestDist) {
                            for (let i = 0; i < 6; i++) {
                                if (!curveMap.has(edgeID(q, r, i))) {
                                    bestDist = dist;
                                    bestTile = { q, r };
                                    break;
                                }
                            }
                        }
                    }
                }

                if (bestTile) {
                    recalculateTile(bestTile.q, bestTile.r);
                    return true;
                }
                return false;
            }

            function getVisibleBounds() {
                let W = dom.cvs.width, H = dom.cvs.height;
                let z = zoom, px = panX, py = panY;
                let margin = HEX_R * z * VISIBLE_BOUND_MULT;
                let tl = pixToHex(-margin, -margin, z, px, py);
                let tr = pixToHex(W + margin, -margin, z, px, py);
                let bl = pixToHex(-margin, H + margin, z, px, py);
                let br = pixToHex(W + margin, H + margin, z, px, py);
                // FIX: Check all 4 corners, otherwise the bounds crop diagonally
                return {
                    minQ: Math.min(tl.q, tr.q, bl.q, br.q),
                    maxQ: Math.max(tl.q, tr.q, bl.q, br.q),
                    minR: Math.min(tl.r, tr.r, bl.r, br.r),
                    maxR: Math.max(tl.r, tr.r, bl.r, br.r)
                };
            }

            function initializeCentralTile() {
                if (curveMap.size > 0) return;
                let center = pixToHex(dom.cvs.width / 2, dom.cvs.height / 2, zoom, panX, panY);
                recalculateTile(center.q, center.r);
            }

            function splitCurve(curveID) {
                let curve = curves.get(curveID);
                if (!curve || curve.size <= 1) return;

                let visited = new Set();
                let components = [];

                for (let id of curve.edges) {
                    if (visited.has(id)) continue;
                    let comp = [];
                    let q = [id];
                    visited.add(id);
                    while (q.length > 0) {
                        let curr = q.pop();
                        comp.push(curr);

                        let parts = curr.split(',');
                        let q1 = parseInt(parts[0]), r1 = parseInt(parts[1]), e1 = parseInt(parts[2]);
                        let n1 = getNeighbor(q1, r1, e1);

                        let k1 = (tileRot(q1, r1) / 60) % 6;
                        let pe1 = getOtherEdge(k1, e1);
                        let pid1 = edgeID(q1, r1, pe1);
                        if (curve.edges.has(pid1) && !visited.has(pid1)) {
                            visited.add(pid1);
                            q.push(pid1);
                        }

                        let q2 = n1.q, r2 = n1.r, e2 = n1.edge;
                        let k2 = (tileRot(q2, r2) / 60) % 6;
                        let pe2 = getOtherEdge(k2, e2);
                        let pid2 = edgeID(q2, r2, pe2);
                        if (curve.edges.has(pid2) && !visited.has(pid2)) {
                            visited.add(pid2);
                            q.push(pid2);
                        }
                    }
                    components.push(comp);
                }

                if (components.length > 1) {
                    components.sort((a, b) => b.length - a.length);
                    curve.edges = new Set(components[0]);
                    curve.size = curve.edges.size;

                    for (let i = 1; i < components.length; i++) {
                        let newID = nextCurveID++;
                        let newCurve = {
                            id: newID,
                            color: curve.color,
                            size: components[i].length,
                            locked: false,
                            edges: new Set(components[i])
                        };
                        curves.set(newID, newCurve);
                        for (let id of newCurve.edges) {
                            curveMap.set(id, newID);
                        }
                    }
                } else if (components.length === 1) {
                    curve.edges = new Set(components[0]);
                    curve.size = curve.edges.size;
                } else {
                    curves.delete(curveID);
                }
            }

            function updateLocalCurves(q, r) {
                let affectedCurves = new Set();
                let ids = [];
                for (let i = 0; i < 6; i++) {
                    let id = edgeID(q, r, i);
                    ids.push(id);
                    if (curveMap.has(id)) {
                        affectedCurves.add(curveMap.get(id));
                    }
                }

                if (affectedCurves.size === 0) {
                    recalculateTile(q, r);
                    return;
                }

                // Opt 2: If all 6 edges belong to the same curve, no splits or merges can occur.
                if (affectedCurves.size === 1) {
                    let cid = [...affectedCurves][0];
                    let allEdgesSame = true;
                    for (let i = 0; i < 6; i++) {
                        if (!curveMap.has(ids[i]) || curveMap.get(ids[i]) !== cid) {
                            allEdgesSame = false;
                            break;
                        }
                    }
                    if (allEdgesSame) {
                        return; 
                    }
                }

                // Collect available colors BEFORE cutting
                let availableColors = [];
                for (let cid of affectedCurves) {
                    let curve = curves.get(cid);
                    if (curve) {
                        availableColors.push(curve.color);
                    }
                }
                if (availableColors.length === 0) {
                    availableColors.push(Math.floor(Math.random() * curveColors.length));
                }

                // Cut the 6 edges
                for (let i = 0; i < 6; i++) {
                    let id = ids[i];
                    if (curveMap.has(id)) {
                        let cid = curveMap.get(id);
                        let curve = curves.get(cid);
                        if (curve) {
                            curve.edges.delete(id);
                            curve.size = curve.edges.size;
                        }
                        curveMap.delete(id);
                    }
                }

                // Delete empty curves and split the rest
                let validAffected = [];
                for (let cid of affectedCurves) {
                    let curve = curves.get(cid);
                    if (curve) {
                        if (curve.size === 0) {
                            curves.delete(cid);
                        } else {
                            validAffected.push(cid);
                        }
                    }
                }

                for (let cid of validAffected) {
                    splitCurve(cid);
                }

                // Form the new pairs
                let k = (tileRot(q, r) / 60) % 6;
                let pairs = [
                    [(2 + k) % 6, (3 + k) % 6],
                    [(4 + k) % 6, (0 + k) % 6],
                    [(1 + k) % 6, (5 + k) % 6]
                ];

                for (let pair of pairs) {
                    let e1 = pair[0], e2 = pair[1];
                    let id1 = ids[e1];
                    let id2 = ids[e2];

                    let n1 = getNeighbor(q, r, e1);
                    let k1 = (tileRot(n1.q, n1.r) / 60) % 6;
                    let n1_other = getOtherEdge(k1, n1.edge);
                    let n1_other_id = edgeID(n1.q, n1.r, n1_other);
                    let c1 = curveMap.has(n1_other_id) ? curveMap.get(n1_other_id) : -1;

                    let n2 = getNeighbor(q, r, e2);
                    let k2 = (tileRot(n2.q, n2.r) / 60) % 6;
                    let n2_other = getOtherEdge(k2, n2.edge);
                    let n2_other_id = edgeID(n2.q, n2.r, n2_other);
                    let c2 = curveMap.has(n2_other_id) ? curveMap.get(n2_other_id) : -1;

                    if (c1 !== -1 && c2 !== -1) {
                        if (c1 !== c2) mergeCurves(c1, c2);
                        let targetCurveID = curveMap.get(n1_other_id);
                        curveMap.set(id1, targetCurveID);
                        curveMap.set(id2, targetCurveID);
                        curves.get(targetCurveID).edges.add(id1);
                        curves.get(targetCurveID).edges.add(id2);
                        curves.get(targetCurveID).size = curves.get(targetCurveID).edges.size;
                    } else if (c1 !== -1) {
                        curveMap.set(id1, c1);
                        curveMap.set(id2, c1);
                        curves.get(c1).edges.add(id1);
                        curves.get(c1).edges.add(id2);
                        curves.get(c1).size = curves.get(c1).edges.size;
                        queue.push({ q: n2.q, r: n2.r, e: n2.edge });
                    } else if (c2 !== -1) {
                        curveMap.set(id1, c2);
                        curveMap.set(id2, c2);
                        curves.get(c2).edges.add(id1);
                        curves.get(c2).edges.add(id2);
                        curves.get(c2).size = curves.get(c2).edges.size;
                        queue.push({ q: n1.q, r: n1.r, e: n1.edge });
                    } else {
                        // Both uncolored. Create new curve with an available color.
                        let color = availableColors[Math.floor(Math.random() * availableColors.length)];
                        let curveID = nextCurveID++;
                        curves.set(curveID, { id: curveID, color: color, size: 0, locked: false, edges: new Set() });
                        curveMap.set(id1, curveID);
                        curveMap.set(id2, curveID);
                        curves.get(curveID).edges.add(id1);
                        curves.get(curveID).edges.add(id2);
                        curves.get(curveID).size = 2;
                        queue.push({ q: n1.q, r: n1.r, e: n1.edge });
                        queue.push({ q: n2.q, r: n2.r, e: n2.edge });
                    }
                }
            }

            function recalculateTile(q, r) {
                let k = (tileRot(q, r) / 60) % 6;
                let pairs = [
                    [(2 + k) % 6, (3 + k) % 6],
                    [(4 + k) % 6, (0 + k) % 6],
                    [(1 + k) % 6, (5 + k) % 6]
                ];

                for (let pair of pairs) {
                    let e1 = pair[0], e2 = pair[1];
                    let id1 = edgeID(q, r, e1);
                    let id2 = edgeID(q, r, e2);

                    let c1 = curveMap.has(id1) ? curveMap.get(id1) : -1;
                    let c2 = curveMap.has(id2) ? curveMap.get(id2) : -1;

                    if (c1 !== -1 && c2 !== -1) {
                        if (c1 !== c2) mergeCurves(c1, c2);
                    } else if (c1 !== -1) {
                        curveMap.set(id2, c1);
                        curves.get(c1).edges.add(id2);
                        curves.get(c1).size++;
                        let n = getNeighbor(q, r, e2);
                        queue.push({ q: n.q, r: n.r, e: n.edge });
                    } else if (c2 !== -1) {
                        curveMap.set(id1, c2);
                        curves.get(c2).edges.add(id1);
                        curves.get(c2).size++;
                        let n = getNeighbor(q, r, e1);
                        queue.push({ q: n.q, r: n.r, e: n.edge });
                    } else {
                        let curveID = nextCurveID++;
                        let color = Math.floor(Math.random() * curveColors.length);
                        curves.set(curveID, { id: curveID, color: color, size: 0, locked: false, edges: new Set() });

                        curveMap.set(id1, curveID);
                        curves.get(curveID).edges.add(id1);
                        curves.get(curveID).size++;
                        let n1 = getNeighbor(q, r, e1);
                        queue.push({ q: n1.q, r: n1.r, e: n1.edge });

                        curveMap.set(id2, curveID);
                        curves.get(curveID).edges.add(id2);
                        curves.get(curveID).size++;
                        let n2 = getNeighbor(q, r, e2);
                        queue.push({ q: n2.q, r: n2.r, e: n2.edge });
                    }
                }
            }

            function getCurveColor(q, r, e) {
                if (curveColors.length === 1) return curveColors[0];
                let id = edgeID(q, r, e);
                if (curveMap.has(id)) {
                    let curveID = curveMap.get(id);
                    let curve = curves.get(curveID);
                    if (curve) return curveColors[curve.color % curveColors.length];
                }
                return '#000000';
            }

            // ──── Gradient List UI ────
            function renderGradientList() {
                const list = dom.gradientList;
                list.innerHTML = '';
                const canRemove = gradientMarkers.length > 1;

                gradientMarkers.forEach((m, i) => {
                    const item = document.createElement('div');
                    item.className = 'grad-item' + (i === activeMarkerIndex ? ' active' : '');

                    const colorInput = document.createElement('input');
                    colorInput.type = 'color';
                    colorInput.value = m.color;
                    colorInput.addEventListener('input', (e) => {
                        gradientMarkers[i].color = e.target.value;
                    });
                    colorInput.addEventListener('click', (e) => e.stopPropagation());

                    const label = document.createElement('span');
                    label.innerText = `Marker ${i + 1}`;

                    item.appendChild(colorInput);
                    item.appendChild(label);

                    if (canRemove) {
                        const removeBtn = document.createElement('button');
                        removeBtn.className = 'grad-remove-btn';
                        removeBtn.innerHTML = '<i class="fas fa-times"></i>';
                        removeBtn.title = 'Remove marker';
                        removeBtn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            gradientMarkers.splice(i, 1);
                            if (activeMarkerIndex === i) {
                                activeMarkerIndex = Math.min(i, gradientMarkers.length - 1);
                            } else if (activeMarkerIndex > i) {
                                activeMarkerIndex--;
                            }
                            renderGradientList();
                        });
                        item.appendChild(removeBtn);
                    }

                    item.addEventListener('click', () => {
                        activeMarkerIndex = i;
                        markersVisible = true;
                        renderGradientList();
                    });

                    list.appendChild(item);
                });
            }

            // ──── Curve List UI ────
            function renderCurveList() {
                const list = dom.curveList;
                list.innerHTML = '';
                const canRemove = curveColors.length > 1;

                curveColors.forEach((m, i) => {
                    const item = document.createElement('div');
                    item.className = 'grad-item' + (i === activeCurveIndex ? ' active' : '');

                    const colorInput = document.createElement('input');
                    colorInput.type = 'color';
                    colorInput.value = m;
                    colorInput.addEventListener('input', (e) => {
                        curveColors[i] = e.target.value;
                    });
                    colorInput.addEventListener('click', (e) => e.stopPropagation());

                    const label = document.createElement('span');
                    label.innerText = `Color ${i + 1}`;

                    item.appendChild(colorInput);
                    item.appendChild(label);

                    if (canRemove) {
                        const removeBtn = document.createElement('button');
                        removeBtn.className = 'grad-remove-btn';
                        removeBtn.innerHTML = '<i class="fas fa-times"></i>';
                        removeBtn.title = 'Remove color';
                        removeBtn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            curveColors.splice(i, 1);
                            if (activeCurveIndex === i) {
                                activeCurveIndex = Math.min(i, curveColors.length - 1);
                            } else if (activeCurveIndex > i) {
                                activeCurveIndex--;
                            }
                            renderCurveList();
                        });
                        item.appendChild(removeBtn);
                    }

                    item.addEventListener('click', () => {
                        activeCurveIndex = i;
                        renderCurveList();
                    });

                    list.appendChild(item);
                });
            }

            function drawTile(cx, cy, sz, rot, isHover, grid, img, tf, hq, hr) {
                const rSz = grid ? sz * 0.95 : sz;
                ctx.save();
                traceHexPath(ctx, cx, cy, rSz);
                ctx.clip();
                ctx.translate(cx, cy);
                ctx.rotate(rot * DEG2RAD);

                if (img) {
                    ctx.rotate(tf.rot * DEG2RAD);
                    ctx.scale(tf.sx * tf.scale, tf.sy * tf.scale);
                    ctx.translate(tf.ox, tf.oy);
                    const iSz = sz * 2.6;
                    ctx.drawImage(img, -iSz / 2, -iSz / 2, iSz, iSz);
                } else {
                    const a = sz * SQRT3 / 2;
                    ctx.lineWidth = sz / 3;
                    ctx.lineCap = 'butt';

                    const logicalRot = tileRot(hq, hr);
                    const k = (logicalRot / 60) % 6;

                    ctx.strokeStyle = getCurveColor(hq, hr, (2 + k) % 6);
                    ctx.beginPath();
                    ctx.arc(-sz, 0, sz / 2, -PI_DIV_3, PI_DIV_3, false);
                    ctx.stroke();

                    ctx.strokeStyle = getCurveColor(hq, hr, (4 + k) % 6);
                    ctx.beginPath();
                    ctx.arc(1.5 * sz, -a, 1.5 * sz, TWO_PI_DIV_3, Math.PI, false);
                    ctx.stroke();

                    ctx.strokeStyle = getCurveColor(hq, hr, (1 + k) % 6);
                    ctx.beginPath();
                    ctx.arc(1.5 * sz, a, 1.5 * sz, Math.PI, FOUR_PI_DIV_3, false);
                    ctx.stroke();
                }

                ctx.restore();

                if (isHover) {
                    ctx.save();
                    ctx.shadowColor = 'rgba(224,122,95,0.4)';
                    ctx.shadowBlur = 18;
                    traceHexPath(ctx, cx, cy, rSz);
                    ctx.strokeStyle = 'rgba(224,122,95,0.7)';
                    ctx.lineWidth = 2.5;
                    ctx.stroke();
                    ctx.restore();
                } else if (grid) {
                    traceHexPath(ctx, cx, cy, rSz);
                    ctx.strokeStyle = 'rgba(10,10,25,0.35)';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }
            }

            // ──── Main render loop ────
            function render() {
                const W = dom.cvs.width, H = dom.cvs.height;
                const now = Date.now();
                const z = zoom, px = panX, py = panY;
                const grid = showGrid, img = texImg, tf = texTf;

                for (const [k, a] of animMap) {
                    if (now - a.start >= a.duration) animMap.delete(k);
                }

                ctx.fillStyle = '#0b0b1a';
                ctx.fillRect(0, 0, W, H);

                drawIDWGradient(W, H);

                ctx.fillStyle = 'rgba(255,255,255,0.025)';
                const dotSpacing = 40;
                const offXMod = ((px % dotSpacing) + dotSpacing) % dotSpacing;
                const offYMod = ((py % dotSpacing) + dotSpacing) % dotSpacing;
                for (let dx = offXMod; dx < W; dx += dotSpacing) {
                    for (let dy = offYMod; dy < H; dy += dotSpacing) {
                        ctx.fillRect(dx, dy, 1, 1);
                    }
                }

                let hexes = visibleHexes(z, px, py, W, H);
                const sz = HEX_R * z;
                const lod = sz > 18 ? 2 : sz > 8 ? 1 : 0;

                if (curveColors.length > 1) {
                    if (queue.length > 0) {
                        processQueue();
                    } else {
                        if (findNextUncoloredTile()) {
                            processQueue();
                        }
                    }
                }

                for (const h of hexes) {
                    const isHover = (h.q === hoveredQ && h.r === hoveredR);
                    const rot = displayRot(h.q, h.r, now);
                    drawTile(h.x, h.y, sz, rot, isHover && lod >= 1, grid, img, tf, h.q, h.r);
                }

                if (markersVisible) {
                    for (let i = 0; i < gradientMarkers.length; i++) {
                        const m = gradientMarkers[i];
                        const outline = getContrastColor(m.color);

                        ctx.save();

                        if (i === activeMarkerIndex) {
                            ctx.beginPath();
                            ctx.arc(m.x, m.y, 14, 0, Math.PI * 2);
                            ctx.strokeStyle = outline;
                            ctx.lineWidth = 3;
                            ctx.stroke();

                            ctx.beginPath();
                            ctx.arc(m.x, m.y, 9, 0, Math.PI * 2);
                            ctx.fillStyle = m.color;
                            ctx.fill();
                            ctx.strokeStyle = outline;
                            ctx.lineWidth = 2;
                            ctx.stroke();

                            ctx.beginPath();
                            ctx.moveTo(m.x - 22, m.y); ctx.lineTo(m.x - 8, m.y);
                            ctx.moveTo(m.x + 8, m.y); ctx.lineTo(m.x + 22, m.y);
                            ctx.moveTo(m.x, m.y - 22); ctx.lineTo(m.x, m.y - 8);
                            ctx.moveTo(m.x, m.y + 8); ctx.lineTo(m.x, m.y + 22);
                            ctx.strokeStyle = outline;
                            ctx.lineWidth = 2;
                            ctx.stroke();
                        } else {
                            ctx.beginPath();
                            ctx.arc(m.x, m.y, 8, 0, Math.PI * 2);
                            ctx.fillStyle = m.color;
                            ctx.fill();
                            ctx.strokeStyle = outline;
                            ctx.lineWidth = 2.5;
                            ctx.stroke();
                        }

                        ctx.restore();
                    }
                }

                requestAnimationFrame(render);
            }

            // ──── Resize ────
            function resize() {
                const w = dom.wrap.clientWidth;
                const h = dom.wrap.clientHeight;
                dom.cvs.width = w;
                dom.cvs.height = h;

                if (!isInitialized) {
                    if (w > 0 && h > 0) {
                        panX = w / 2;
                        panY = h / 2;
                        isInitialized = true;

                        gradientMarkers.push({
                            x: w / 2,
                            y: h / 2,
                            color: markerPalette[0]
                        });
                        activeMarkerIndex = 0;
                        renderGradientList();
                        renderCurveList();
                    } else {
                        requestAnimationFrame(resize);
                    }
                }
            }
            window.addEventListener('resize', resize);

            function setZoom(nz, cx, cy) {
                const oz = zoom;
                zoom = Math.max(MIN_Z, Math.min(MAX_Z, nz));
                if (cx !== undefined) {
                    panX = cx - (cx - panX) * (zoom / oz);
                    panY = cy - (cy - panY) * (zoom / oz);
                }
                dom.zoomLabel.textContent = Math.round(zoom * 100) + '%';
            }

            dom.cvs.addEventListener('wheel', e => {
                e.preventDefault();
                const r = dom.cvs.getBoundingClientRect();
                setZoom(zoom * (e.deltaY > 0 ? 0.88 : 1.12), e.clientX - r.left, e.clientY - r.top);
            }, { passive: false });

            dom.cvs.addEventListener('mousedown', e => {
                const r = dom.cvs.getBoundingClientRect();
                const mx = e.clientX - r.left;
                const my = e.clientY - r.top;

                if (markersVisible) {
                    let clickedMarkerIdx = -1;
                    for (let i = 0; i < gradientMarkers.length; i++) {
                        const m = gradientMarkers[i];
                        const dx = mx - m.x;
                        const dy = my - m.y;
                        const hitR = (i === activeMarkerIndex) ? 22 : 14;
                        if (dx * dx + dy * dy < hitR * hitR) {
                            clickedMarkerIdx = i;
                            break;
                        }
                    }

                    if (clickedMarkerIdx !== -1) {
                        isDragMarker = true;
                        activeMarkerIndex = clickedMarkerIdx;
                        renderGradientList();
                        dragMarkerOffsetX = mx - gradientMarkers[clickedMarkerIdx].x;
                        dragMarkerOffsetY = my - gradientMarkers[clickedMarkerIdx].y;
                        return;
                    }
                }

                isDrag = true; dragMoved = false;
                dragSX = e.clientX; dragSY = e.clientY;
                dragPX = panX; dragPY = panY;
            });

            window.addEventListener('mousemove', e => {
                const r = dom.cvs.getBoundingClientRect();
                const mx = e.clientX - r.left;
                const my = e.clientY - r.top;

                if (isDragMarker && activeMarkerIndex !== -1) {
                    gradientMarkers[activeMarkerIndex].x = mx - dragMarkerOffsetX;
                    gradientMarkers[activeMarkerIndex].y = my - dragMarkerOffsetY;
                    return;
                }

                mouseScreenX = mx;
                mouseScreenY = my;
                const h = pixToHex(mouseScreenX, mouseScreenY, zoom, panX, panY);
                hoveredQ = h.q; hoveredR = h.r;
                updateHoverInfo();

                if (isDrag) {
                    const dx = e.clientX - dragSX, dy = e.clientY - dragSY;
                    if (Math.abs(dx) + Math.abs(dy) > CLICK_THRESH) {
                        if (!dragMoved) {
                            dragMoved = true;
                            markersVisible = false;
                        }
                    }
                    panX = dragPX + dx;
                    panY = dragPY + dy;
                }
            });

            window.addEventListener('mouseup', e => {
                if (isDragMarker) {
                    isDragMarker = false;
                    return;
                }
                if (isDrag && !dragMoved) handleClick(e);
                isDrag = false;
            });

            dom.cvs.addEventListener('dblclick', e => {
                const r = dom.cvs.getBoundingClientRect();
                const h = pixToHex(e.clientX - r.left, e.clientY - r.top, zoom, panX, panY);
                const k = hexKey(h.q, h.r);
                const now = Date.now();
                const curDisplay = displayRot(h.q, h.r, now);

                rotOverrides.delete(k);
                const base = baseRot(h.q, h.r);
                const target = nearestTarget(curDisplay, base);
                animMap.set(k, { start: now, from: curDisplay, to: target, duration: CLICK_DUR });
                updateLocalCurves(h.q, h.r);
                toast('Tile reset to default orientation');
            });

            function handleClick(e) {
                const r = dom.cvs.getBoundingClientRect();
                const h = pixToHex(e.clientX - r.left, e.clientY - r.top, zoom, panX, panY);
                const k = hexKey(h.q, h.r);
                const now = Date.now();

                const curDisplay = displayRot(h.q, h.r, now);
                const curLogical = tileRot(h.q, h.r);
                const nextLogical = (curLogical + ROT_STEP) % 360;
                rotOverrides.set(k, nextLogical);

                const target = curDisplay + ROT_STEP;
                animMap.set(k, { start: now, from: curDisplay, to: target, duration: CLICK_DUR });
                updateLocalCurves(h.q, h.r);
            }

            function updateHoverInfo() {
                if (hoveredQ !== null) {
                    dom.hoverInfo.classList.add('visible');
                    dom.defaultInfo.style.display = 'none';
                    dom.hiCoord.textContent = `(${hoveredQ}, ${hoveredR})`;
                    dom.hiRot.textContent = ((tileRot(hoveredQ, hoveredR) % 360) + 360) % 360 + '°';
                } else {
                    dom.hoverInfo.classList.remove('visible');
                    dom.defaultInfo.style.display = '';
                }
            }

            dom.zoomIn.onclick = () => setZoom(zoom * 1.25, dom.cvs.width / 2, dom.cvs.height / 2);
            dom.zoomOut.onclick = () => setZoom(zoom / 1.25, dom.cvs.width / 2, dom.cvs.height / 2);
            dom.resetView.onclick = () => {
                zoom = 1; panX = dom.cvs.width / 2; panY = dom.cvs.height / 2;
                dom.zoomLabel.textContent = '100%';
            };

            window.addEventListener('keydown', e => {
                if (e.key === '=' || e.key === '+') setZoom(zoom * 1.15, dom.cvs.width / 2, dom.cvs.height / 2);
                if (e.key === '-') setZoom(zoom / 1.15, dom.cvs.width / 2, dom.cvs.height / 2);
            });

            dom.gridToggle.addEventListener('change', function () { showGrid = this.checked; });

            function bulkAnimate(newMode, newSeed) {
                const now = Date.now();
                const hexes = visibleHexes(zoom, panX, panY, dom.cvs.width, dom.cvs.height);
                const snapshots = new Map();
                for (const h of hexes) snapshots.set(hexKey(h.q, h.r), displayRot(h.q, h.r, now));
                rotOverrides.clear();
                rotMode = newMode;
                randomSeed = newSeed;
                for (const h of hexes) {
                    const k = hexKey(h.q, h.r);
                    const curDisplay = snapshots.get(k);
                    const newBase = baseRot(h.q, h.r);
                    const target = nearestTarget(curDisplay, newBase);
                    if (Math.abs(target - curDisplay) > 0.5) {
                        animMap.set(k, { start: now, from: curDisplay, to: target, duration: BULK_DUR });
                    } else {
                        animMap.delete(k);
                    }
                }
                curveMap.clear();
                curves.clear();
                queue = [];
                initializeCentralTile();
            }

            dom.randomizeBtn.onclick = () => {
                bulkAnimate('hash', (randomSeed + 1) & 0x7FFFFFFF);
                toast('All tile angles randomized');
            };

            dom.resetAllRot.onclick = () => {
                bulkAnimate('zero', 0);
                toast('All tile rotations reset to default');
            };

            dom.uploadZone.onclick = () => dom.fileInput.click();
            dom.uploadZone.ondragover = e => { e.preventDefault(); dom.uploadZone.style.borderColor = 'var(--accent)'; };
            dom.uploadZone.ondragleave = () => { dom.uploadZone.style.borderColor = ''; };
            dom.uploadZone.ondrop = e => {
                e.preventDefault(); dom.uploadZone.style.borderColor = '';
                if (e.dataTransfer.files[0]?.type.startsWith('image/')) loadFile(e.dataTransfer.files[0]);
            };
            dom.fileInput.onchange = () => { if (dom.fileInput.files[0]) loadFile(dom.fileInput.files[0]); };

            function loadFile(file) {
                dom.fileName.textContent = file.name;
                const reader = new FileReader();
                reader.onload = ev => {
                    const img = new Image();
                    img.onload = () => { pendImg = img; openEditor(); };
                    img.src = ev.target.result;
                };
                reader.readAsDataURL(file);
            }

            function readSliders() {
                return { rot: +dom.sRot.value, scale: +dom.sScale.value, sx: +dom.sSX.value, sy: +dom.sSY.value, ox: +dom.sOX.value, oy: +dom.sOY.value };
            }

            function writeSliders(tf) {
                dom.sRot.value = tf.rot; dom.sScale.value = tf.scale;
                dom.sSX.value = tf.sx; dom.sSY.value = tf.sy;
                dom.sOX.value = tf.ox; dom.sOY.value = tf.oy;
                syncSliderLabels();
            }

            function openEditor() { dom.editorPanel.classList.add('open'); writeSliders(texTf); drawPreview(); }
            function closeEditor() { dom.editorPanel.classList.remove('open'); pendImg = null; }
            function applyTexture() {
                if (pendImg) texImg = pendImg;
                texTf = readSliders();
                toast('Texture applied — keep adjusting or close the editor');
            }

            dom.cancelEd.onclick = closeEditor;
            dom.applyEd.onclick = applyTexture;
            dom.resetTexBtn.onclick = () => {
                texImg = null;
                texTf = { rot: 0, scale: 1, sx: 1, sy: 1, ox: 0, oy: 0 };
                if (dom.editorPanel.classList.contains('open')) { writeSliders(texTf); drawPreview(); }
                pendImg = null; closeEditor();
                dom.fileName.textContent = '';
                toast('Texture reset to white');
            };

            [dom.sRot, dom.sScale, dom.sSX, dom.sSY, dom.sOX, dom.sOY].forEach(el => {
                el.addEventListener('input', () => { syncSliderLabels(); drawPreview(); });
            });

            function syncSliderLabels() {
                dom.vRot.textContent = dom.sRot.value + '°';
                dom.vScale.textContent = (+dom.sScale.value).toFixed(2) + 'x';
                dom.vSX.textContent = (+dom.sSX.value).toFixed(2) + 'x';
                dom.vSY.textContent = (+dom.sSY.value).toFixed(2) + 'x';
                dom.vOX.textContent = dom.sOX.value;
                dom.vOY.textContent = dom.sOY.value;
            }

            function drawPreview() {
                const pc = dom.previewCanvas;
                const pctx = pc.getContext('2d');
                const cX = 110, cY = 110, rSz = 85;
                pctx.clearRect(0, 0, 220, 220);
                pctx.fillStyle = '#0b0b1a';
                pctx.fillRect(0, 0, 220, 220);
                pctx.save();
                traceHexPath(pctx, cX, cY, rSz);
                pctx.clip();
                pctx.translate(cX, cY);
                const img = pendImg || texImg;
                if (img) {
                    const tf = readSliders();
                    pctx.rotate(tf.rot * DEG2RAD);
                    pctx.scale(tf.sx * tf.scale, tf.sy * tf.scale);
                    pctx.translate(tf.ox, tf.oy);
                    const iSz = rSz * 2.6;
                    pctx.drawImage(img, -iSz / 2, -iSz / 2, iSz, iSz);
                } else {
                    pctx.fillStyle = '#f0f0f5';
                    pctx.fillRect(-rSz, -rSz, rSz * 2, rSz * 2);
                }
                pctx.restore();
                traceHexPath(pctx, cX, cY, rSz);
                pctx.strokeStyle = 'rgba(224,122,95,0.6)';
                pctx.lineWidth = 2;
                pctx.stroke();
                for (let i = 0; i < 6; i++) {
                    const a = PI_DIV_3 * i;
                    pctx.beginPath();
                    pctx.arc(cX + rSz * Math.cos(a), cY + rSz * Math.sin(a), 3, 0, Math.PI * 2);
                    pctx.fillStyle = '#e07a5f';
                    pctx.fill();
                }
            }

            let toastTimer = null;
            function toast(msg) {
                dom.toast.textContent = msg;
                dom.toast.classList.add('show');
                clearTimeout(toastTimer);
                toastTimer = setTimeout(() => dom.toast.classList.remove('show'), 2200);
            }

            dom.addMarkerBtn.onclick = () => {
                const cx = dom.cvs.width / 2 + (Math.random() - 0.5) * 200;
                const cy = dom.cvs.height / 2 + (Math.random() - 0.5) * 200;
                const color = markerPalette[gradientMarkers.length % markerPalette.length];
                gradientMarkers.push({ x: cx, y: cy, color: color });
                activeMarkerIndex = gradientMarkers.length - 1;
                markersVisible = true;
                renderGradientList();
            };

            dom.addCurveBtn.onclick = () => {
                const color = curvePalette[curveColors.length % curvePalette.length];
                curveColors.push(color);
                activeCurveIndex = curveColors.length - 1;
                renderCurveList();
            };

            resize();
            render();
        })();
    </script>
</body>

</html>
